name: No-Examples Experiment

on:
  workflow_dispatch:

jobs:
  run-evals:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix:
        model:
          - "anthropic/claude-opus-4.6"
          - "anthropic/claude-sonnet-4.6"
          - "google/gemini-3-flash-preview"
          - "openai/gpt-5.4"

    env:
      ENVIRONMENT: ci
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      SKIP_PROMPT_EXAMPLES: "1"
      DISABLE_CONVEX_REPORTING: "1"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Bun
        run: npm install -g bun@1.3.8

      - name: Install dependencies
        run: bun install

      - name: Create temp directory
        run: mkdir -p /tmp/convex-evals

      - name: Run evaluations (no examples)
        env:
          OUTPUT_TEMPDIR: /tmp/convex-evals
          MODELS: ${{ matrix.model }}
        run: bun run runner/index.ts
